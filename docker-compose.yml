version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dst-backend
    ports:
      - "9000:9000"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
      - backend-media:/app/media
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             python manage.py create_default_admin --noinput || true &&
             gunicorn config.wsgi:application --bind 0.0.0.0:9000 --reload --workers 2"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dst-frontend
    ports:
      - "9001:9001"
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 9001
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-media:
